<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thumbmaker — AI YouTube Thumbnail Generator</title>
    <meta name="description" content="Upload a headshot, describe the vibe, get publish-ready thumbnails in three artistic styles — YouTube, Shorts, and square." />
    <script>
      (function () {
        const stored = localStorage.getItem("thumbmaker-theme");
        if (stored === "light") {
          document.documentElement.classList.remove("dark");
        } else if (stored === "dark" || !stored) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
